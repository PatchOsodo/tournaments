<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Stats — Tournament Manager</title>
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<!-- Top navigation bar -->
<nav class="app-nav" id="app-nav">
  <div class="app-nav-links">
    <a href="index.html" class="nav-link active" id="nav-home">🏠 Home</a>
    <a href="stats.html" class="nav-link" id="nav-stats">📊 Stats</a>
  </div>
  <div id="auth-controls"></div>
</nav>

<!-- Bottom nav bar (mobile only) -->
<nav class="bottom-nav">
  <a href="index.html" class="bottom-nav-item">
    <span class="nav-icon">🏠</span>Home
  </a>
  <a href="stats.html" class="bottom-nav-item active">
    <span class="nav-icon">📊</span>Stats
  </a>
  <a href="login.html" class="bottom-nav-item">
    <span class="nav-icon">👤</span>Account
  </a>
</nav>
<div class="page-wrapper">
<div class="app">

  <!-- APP HEADER -->
  <div class="app-header">
    <div>
      <h1>Team Statistics</h1>
      <p>Basketball · Cross-tournament analysis</p>
    </div>
    <div class="app-header-right">
      <span class="conn-dot" id="conn-dot"></span>
      <span class="conn-label" id="conn-label">Connecting...</span>
    </div>
  </div>

  <!-- Auth bar -->
  <div id="auth-bar" style="
    display:flex;align-items:center;gap:10px;padding:8px 1rem;
    background:var(--bg-secondary);border-bottom:0.5px solid var(--border-light);
    justify-content:space-between;flex-wrap:wrap;gap:8px;
  ">
    <div style="display:flex;gap:8px;">
      <a href="index.html" class="btn sm ghost">← Home</a>
    </div>
    <div id="auth-controls"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="stats-page">

    <div class="stats-header">
      <div>
        <h1>📊 Team Statistics</h1>
        <p id="stats-summary">Loading...</p>
      </div>
    </div>

    <!-- Tab navigation -->
    <div class="tab-row" id="tab-row">
      <button class="tab active" onclick="switchTab(0)">Teams</button>
      <button class="tab"        onclick="switchTab(1)">Head to Head</button>
      <button class="tab"        onclick="switchTab(2)">Rankings</button>
    </div>

    <!-- =====================================================================
         TAB 0: TEAMS
         ===================================================================== -->
    <div class="tab-panel active" id="panel-teams">
      <div class="search-bar" style="margin-top:1rem;">
        <input type="text"
               id="team-search"
               placeholder="Search teams..."
               oninput="filterTeams()" />
        <select id="category-filter" onchange="filterTeams()">
          <option value="">All categories</option>
        </select>
      </div>
      <div id="teams-list">
        <div class="stats-empty">
          <span class="stats-empty-icon">⏳</span>
          Loading teams...
        </div>
      </div>
    </div>

    <!-- =====================================================================
         TAB 1: HEAD TO HEAD
         ===================================================================== -->
    <div class="tab-panel" id="panel-h2h" style="margin-top:1rem;">
      <div class="h2h-selector">
        <select id="h2h-team1" onchange="loadH2H()">
          <option value="">Select team A</option>
        </select>
        <div class="h2h-vs">vs</div>
        <select id="h2h-team2" onchange="loadH2H()">
          <option value="">Select team B</option>
        </select>
      </div>
      <div id="h2h-result">
        <div class="stats-empty">
          <span class="stats-empty-icon">⚔️</span>
          Select two teams to see their head-to-head record.
        </div>
      </div>
    </div>

    <!-- =====================================================================
         TAB 2: RANKINGS
         ===================================================================== -->
    <div class="tab-panel" id="panel-rankings" style="margin-top:1rem;">
      <div class="search-bar">
        <select id="rankings-category" onchange="renderRankings()">
          <option value="">All categories</option>
        </select>
        <select id="rankings-sort" onchange="renderRankings()">
          <option value="win_pct">Win %</option>
          <option value="wins">Total wins</option>
          <option value="point_diff">Point differential</option>
          <option value="points_for">Points scored</option>
          <option value="tournaments">Tournaments played</option>
        </select>
      </div>
      <div id="rankings-table-wrap">
        <div class="stats-empty">
          <span class="stats-empty-icon">🏅</span>
          Loading rankings...
        </div>
      </div>
    </div>

  </div><!-- /.stats-page -->
</div><!-- /.app -->
</div><!-- /.page-wrapper -->

<!-- Team detail modal -->
<div id="team-modal-overlay" style="
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);
  z-index:200;overflow-y:auto;padding:1rem;
" onclick="closeTeamModal(event)">
  <div id="team-modal-content" style="
    background:var(--bg-primary);border-radius:var(--radius-lg);
    max-width:560px;margin:2rem auto;padding:1.5rem;
    border:0.5px solid var(--border-light);
  " onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 id="team-modal-title" style="font-size:18px;font-weight:700;margin:0;"></h2>
      <button class="btn sm ghost" onclick="closeTeamModal()">✕</button>
    </div>
    <div id="team-modal-body"></div>
  </div>
</div>

<!-- Scripts -->
<script src="assets/js/pocketbase.umd.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/logger.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/stats.js"></script>

</body>
</html>
