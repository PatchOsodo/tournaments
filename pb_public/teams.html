<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams — Tournament Manager</title>
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
 <nav class="app-nav" id="app-nav">
    <div class="app-nav-links">
      <a href="index.html" class="nav-link" id="nav-home">🏠 Home</a>
      <a href="stats.html" class="nav-link" id="nav-stats">📊 Stats</a>
      <a href="teams.html" class="nav-link" id="nav-teams">🏀 Teams</a>
    </div>
    <div id="auth-controls"></div>
  </nav>

  <!-- Bottom nav bar (mobile only) -->
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item active">
      <span class="nav-icon">🏠</span>Home
    </a>
    <a href="stats.html" class="bottom-nav-item">
      <span class="nav-icon">📊</span>Stats
    </a>
    <a href="teams.html" class="bottom-nav-item">
      <span class="nav-icon">🏀</span> Teams
    </a>
    <a href="login.html" class="bottom-nav-item" id="bottom-nav-auth">
      <span class="nav-icon">👤</span>Account
    </a>
  </nav>

<div class="page-wrapper">
<div class="app">

  <!-- APP HEADER -->
  <div class="app-header">
    <div>
      <h1>Team Registry</h1>
      <p>Basketball · Registered teams</p>
    </div>
    <div class="app-header-right">
      <span class="conn-dot" id="conn-dot"></span>
      <span class="conn-label" id="conn-label">Connecting...</span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div style="max-width:700px;margin:0 auto;padding:0 1rem 3rem;">

    <!-- Page heading + add button -->
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:1rem 0 0.75rem;flex-wrap:wrap;gap:8px;">
      <div>
        <div style="font-size:18px;font-weight:700;color:var(--text-primary);">🏀 Team Registry</div>
        <div id="registry-summary"
             style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">
          Loading...
        </div>
      </div>
      <div id="admin-add-btn" style="display:none;">
        <button class="btn sm primary" onclick="Teams.openAddModal()">+ Register team</button>
      </div>
    </div>

    <!-- Filter bar -->
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;">
      <input type="text"
             id="registry-search"
             placeholder="Search teams..."
             oninput="Teams.renderList()"
             style="flex:1;min-width:120px;padding:8px 12px;font-size:13px;
                    border:1px solid var(--border-light);border-radius:var(--radius-md);
                    background:var(--bg-secondary);color:var(--text-primary);" />
      <select id="filter-gender"
              onchange="Teams.renderList()"
              style="min-width:110px;padding:8px 12px;font-size:13px;
                     border:1px solid var(--border-light);border-radius:var(--radius-md);
                     background:var(--bg-secondary);color:var(--text-primary);">
        <option value="">All genders</option>
        <option value="Boys">Boys</option>
        <option value="Girls">Girls</option>
        <option value="Mixed">Mixed</option>
      </select>
      <select id="filter-age"
              onchange="Teams.renderList()"
              style="min-width:130px;padding:8px 12px;font-size:13px;
                     border:1px solid var(--border-light);border-radius:var(--radius-md);
                     background:var(--bg-secondary);color:var(--text-primary);">
        <option value="">All age groups</option>
      </select>
    </div>

    <!-- Team list -->
    <div id="teams-registry-list">
      <div class="empty-state">
        <span class="empty-icon">⏳</span>Loading teams...
      </div>
    </div>

  </div><!-- /main content -->
</div><!-- /.app -->
</div><!-- /.page-wrapper -->

<!-- =========================================================================
     ADD / EDIT TEAM MODAL
     ========================================================================= -->
<div id="team-form-overlay"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);
            z-index:200;overflow-y:auto;padding:1rem;"
     onclick="Teams.closeFormModal(event)">
  <div style="background:var(--bg-primary);border-radius:var(--radius-lg);
              max-width:480px;margin:2rem auto;padding:1.5rem;
              border:0.5px solid var(--border-light);"
       onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
      <h2 id="form-modal-title" style="font-size:16px;font-weight:600;margin:0;">Register team</h2>
      <button class="btn sm ghost" onclick="Teams.closeFormModal()">✕</button>
    </div>

    <!-- Form fields -->
    <div style="display:grid;gap:1rem;">

      <div>
        <label style="font-size:13px;color:var(--text-secondary);display:block;margin-bottom:5px;">
          Team name <span style="color:var(--danger)">*</span>
        </label>
        <input type="text" id="form-name" maxlength="60" placeholder="e.g. SHAURI"
               style="width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--border-light);
                      border-radius:var(--radius-md);background:var(--bg-secondary);
                      color:var(--text-primary);box-sizing:border-box;" />
      </div>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <label style="font-size:13px;color:var(--text-secondary);display:block;margin-bottom:5px;">
            Gender <span style="color:var(--danger)">*</span>
          </label>
          <select id="form-gender"
                  style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border-light);
                         border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);">
            <option value="">Select</option>
            <option value="Boys">Boys</option>
            <option value="Girls">Girls</option>
            <option value="Mixed">Mixed</option>
          </select>
        </div>
        <div>
          <label style="font-size:13px;color:var(--text-secondary);display:block;margin-bottom:5px;">
            Age group <span style="color:var(--danger)">*</span>
          </label>
          <select id="form-age-group"
                  onchange="Teams.onFormAgeGroupChange(this.value)"
                  style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border-light);
                         border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);">
            <option value="">Select</option>
            <option value="U8">U8</option>
            <option value="U10">U10</option>
            <option value="U12">U12</option>
            <option value="U13">U13</option>
            <option value="U14">U14</option>
            <option value="U15">U15</option>
            <option value="U16">U16</option>
            <option value="U17">U17</option>
            <option value="U18">U18</option>
            <option value="Senior">Senior</option>
            <option value="custom">Custom...</option>
          </select>
          <input type="text" id="form-age-custom"
                 placeholder="e.g. U19, U21" maxlength="20"
                 style="display:none;width:100%;margin-top:6px;padding:9px 12px;font-size:13px;
                        border:1px solid var(--border-light);border-radius:var(--radius-md);
                        background:var(--bg-secondary);color:var(--text-primary);box-sizing:border-box;" />
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <label style="font-size:13px;color:var(--text-secondary);display:block;margin-bottom:5px;">
            Short name
          </label>
          <input type="text" id="form-short-name" maxlength="10" placeholder="e.g. SHA"
                 style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border-light);
                        border-radius:var(--radius-md);background:var(--bg-secondary);
                        color:var(--text-primary);box-sizing:border-box;" />
        </div>
        <div>
          <label style="font-size:13px;color:var(--text-secondary);display:block;margin-bottom:5px;">
            Home court
          </label>
          <input type="text" id="form-home-court" maxlength="60" placeholder="e.g. Nyayo Stadium"
                 style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border-light);
                        border-radius:var(--radius-md);background:var(--bg-secondary);
                        color:var(--text-primary);box-sizing:border-box;" />
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="form-active" checked
               style="width:16px;height:16px;accent-color:var(--accent);" />
        <label for="form-active" style="font-size:13px;color:var(--text-secondary);cursor:pointer;">
          Active team (participating in current season)
        </label>
      </div>

    </div><!-- /form fields -->

    <div id="form-error"
         style="display:none;font-size:12px;padding:8px 12px;border-radius:var(--radius-md);
                margin-top:1rem;background:#fef2f2;border:0.5px solid var(--danger);
                color:var(--danger);"></div>

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;">
      <button class="btn sm ghost" onclick="Teams.closeFormModal()">Cancel</button>
      <button class="btn sm primary" id="btn-save-team" onclick="Teams.saveTeam()">
        Save team
      </button>
    </div>
  </div>
</div>

<!-- =========================================================================
     TEAM PROFILE MODAL
     ========================================================================= -->
<div id="team-profile-overlay"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);
            z-index:200;overflow-y:auto;padding:1rem;"
     onclick="Teams.closeProfileModal(event)">
  <div style="background:var(--bg-primary);border-radius:var(--radius-lg);
              max-width:560px;margin:2rem auto;padding:1.5rem;
              border:0.5px solid var(--border-light);"
       onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <div>
        <h2 id="profile-name" style="font-size:18px;font-weight:700;margin:0;"></h2>
        <div id="profile-category" style="font-size:12px;color:var(--text-tertiary);margin-top:3px;"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <div id="profile-admin-btns" style="display:none;gap:8px;display:none;">
          <button class="btn sm ghost" id="btn-edit-team" onclick="Teams.openEditFromProfile()">
            ✏️ Edit
          </button>
          <button class="btn sm danger" id="btn-delete-team" onclick="Teams.deleteTeamFromProfile()">
            Delete
          </button>
        </div>
        <button class="btn sm ghost" onclick="Teams.closeProfileModal()">✕</button>
      </div>
    </div>
    <div id="profile-body"></div>
  </div>
</div>

<!-- Scripts -->
<script src="assets/js/pocketbase.umd.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/teams.js"></script>
</body>
</html>
