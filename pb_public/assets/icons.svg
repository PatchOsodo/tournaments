<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>

    <!-- basketball -->
    <symbol id="icon-ball" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/>
      <path d="M12 2a15.3 15.3 0 0 0-4 10 15.3 15.3 0 0 0 4 10"/>
      <path d="M2 12h20"/>
    </symbol>

    <!-- trophy -->
    <symbol id="icon-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M6 9H4a2 2 0 0 1-2-2V5h4"/>
      <path d="M18 9h2a2 2 0 0 0 2-2V5h-4"/>
      <path d="M6 2h12v7a6 6 0 0 1-12 0V2Z"/>
      <path d="M12 15v4"/>
      <path d="M8 21h8"/>
      <path d="M9 15a6 6 0 0 0 6 0"/>
    </symbol>

    <!-- stats / bar chart -->
    <symbol id="icon-stats" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="18" y="3"  width="4" height="18" rx="1"/>
      <rect x="10" y="8"  width="4" height="13" rx="1"/>
      <rect x="2"  y="13" width="4" height="8"  rx="1"/>
    </symbol>

    <!-- home -->
    <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5Z"/>
      <path d="M9 21V12h6v9"/>
    </symbol>

    <!-- user / account -->
    <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
    </symbol>

    <!-- edit / pencil -->
    <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/>
    </symbol>

    <!-- check -->
    <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="20 6 9 17 4 12"/>
    </symbol>

    <!-- warning circle -->
    <symbol id="icon-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <circle cx="12" cy="16" r="0.8" fill="currentColor" stroke="none"/>
    </symbol>

    <!-- back arrow / chevron left -->
    <symbol id="icon-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </symbol>

    <!-- refresh -->
    <symbol id="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </symbol>

    <!-- print -->
    <symbol id="icon-print" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </symbol>

    <!-- plus -->
    <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5"  y1="12" x2="19" y2="12"/>
    </symbol>

    <!-- close / x -->
    <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6"  y2="18"/>
      <line x1="6"  y1="6" x2="18" y2="18"/>
    </symbol>

    <!-- sign out -->
    <symbol id="icon-signout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </symbol>

    <!-- eye (show password) -->
    <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
      <circle cx="12" cy="12" r="3"/>
    </symbol>

    <!-- eye-off (hide password) -->
    <symbol id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </symbol>

    <!-- round robin -->
    <symbol id="icon-roundrobin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polyline points="17 1 21 5 17 9"/>
      <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
      <polyline points="7 23 3 19 7 15"/>
      <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
    </symbol>

    <!-- elimination bracket -->
    <symbol id="icon-elimination" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="2"  y="3"  width="6" height="4" rx="1"/>
      <rect x="2"  y="17" width="6" height="4" rx="1"/>
      <rect x="9"  y="10" width="6" height="4" rx="1"/>
      <rect x="16" y="10" width="6" height="4" rx="1"/>
      <line x1="8"  y1="5"  x2="9"  y2="5"/>
      <line x1="8"  y1="19" x2="9"  y2="19"/>
      <line x1="9"  y1="5"  x2="9"  y2="19"/>
      <line x1="15" y1="12" x2="16" y2="12"/>
    </symbol>

    <!-- group stage -->
    <symbol id="icon-groupstage" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3"  y="3"  width="7" height="7" rx="1"/>
      <rect x="14" y="3"  width="7" height="7" rx="1"/>
      <rect x="3"  y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </symbol>

    <!-- hourglass / pending -->
    <symbol id="icon-pending" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M5 3h14M5 21h14"/>
      <path d="M5 3c0 7 7 9 7 12S5 18 5 21"/>
      <path d="M19 3c0 7-7 9-7 12s7 6 7 9"/>
    </symbol>

    <!-- alert triangle -->
    <symbol id="icon-alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>
      <line x1="12" y1="9"  x2="12" y2="13"/>
      <circle cx="12" cy="17" r="0.8" fill="currentColor" stroke="none"/>
    </symbol>

    <!-- delete / trash -->
    <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </symbol>

    <!-- open / external link -->
    <symbol id="icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15 3 21 3 21 9"/>
      <line x1="10" y1="14" x2="21" y2="3"/>
    </symbol>

    <!-- bracket / full bracket view -->
    <symbol id="icon-bracket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="2"  y="4"  width="5" height="3" rx="1"/>
      <rect x="2"  y="11" width="5" height="3" rx="1"/>
      <rect x="2"  y="17" width="5" height="3" rx="1"/>
      <rect x="10" y="7"  width="5" height="3" rx="1"/>
      <rect x="10" y="14" width="5" height="3" rx="1"/>
      <rect x="17" y="10" width="5" height="4" rx="1"/>
      <line x1="7"  y1="5.5"  x2="10" y2="5.5"/>
      <line x1="7"  y1="12.5" x2="8.5" y2="12.5"/>
      <line x1="7"  y1="18.5" x2="10" y2="18.5"/>
      <line x1="8.5" y1="5.5" x2="8.5" y2="18.5"/>
      <line x1="15" y1="8.5"  x2="17" y2="8.5"/>
      <line x1="15" y1="15.5" x2="16" y2="15.5"/>
      <line x1="16" y1="8.5"  x2="16" y2="15.5"/>
    </symbol>

  </defs>
</svg>
