<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket View — Tournament Manager</title>
<link rel="stylesheet" href="assets/css/styles.css">
<style>
  /* Bracket page specific print styles */
  @media print {
    .app-header-right,
    .bracket-page-actions { display: none !important; }
    body { background: #fff; }
    .bc-match { break-inside: avoid; }
  }
</style>
</head>
<body>
  <script>
    fetch('assets/icons.svg')
      .then(r => r.text())
      .then(svg => {
        const div = document.createElement('div');
        div.innerHTML = svg;
        document.body.insertBefore(div.firstChild, document.body.firstChild);
      });
  </script>
<!-- Top navigation bar -->
 <nav class="app-nav" id="app-nav">
    <div class="app-nav-links">
      <a href="index.html" class="nav-link active" id="nav-home">🏠 Home</a>
      <a href="stats.html" class="nav-link" id="nav-stats">📊 Stats</a>
      <a href="teams.html" class="nav-link" id="nav-teams">🏀 Teams</a>
    </div>
    <div id="auth-controls"></div>
  </nav>

  <!-- Bottom nav bar (mobile only) -->
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item active">
      <span class="nav-icon">🏠</span>Home
    </a>
    <a href="stats.html" class="bottom-nav-item">
      <span class="nav-icon">📊</span>Stats
    </a>
    <a href="teams.html" class="bottom-nav-item">
      <span class="nav-icon">🏀</span> Teams
    </a>
    <a href="login.html" class="bottom-nav-item" id="bottom-nav-auth">
      <span class="nav-icon">👤</span>Account
    </a>
  </nav>

<div class="page-wrapper">
<div class="app wide">

  <!-- =====================================================================
       BRACKET PAGE HEADER
       ===================================================================== -->
  <div class="app-header">
    <div>
      <div class="bracket-page-title" id="bracket-title">Loading...</div>
      <div class="bracket-page-meta"  id="bracket-meta"></div>
    </div>
    <div class="app-header-right bracket-page-actions">
      <span class="status-badge badge-pending" id="bracket-status">—</span>
      <button class="btn sm ghost" onclick="BracketPage.refresh()">↻ Refresh</button>
      <button class="btn sm ghost" onclick="BracketPage.print()">🖨 Print</button>
      <a class="btn sm" href="index.html">← App</a>
    </div>
  </div>
  <!-- =====================================================================
       CHAMPION BOX
       Only shown when tournament status = completed.
       ===================================================================== -->
  <div class="champion-box" id="champion-box" style="display:none;"></div>

  <!-- =====================================================================
       BRACKET CANVAS
       Populated by bracket.js based on tournament format.
       ===================================================================== -->
  <div id="bracket-canvas-area">
    <div class="no-bracket">
      <span style="font-size:32px;display:block;margin-bottom:0.75rem">⏳</span>
      Loading bracket...
    </div>
  </div>

</div><!-- /.app -->
</div><!-- /.page-wrapper -->

<!-- Scripts -->
<script src="assets/js/pocketbase.umd.js"></script>
<script src="assets/js/bracket.js"></script>
</body>
</html>
