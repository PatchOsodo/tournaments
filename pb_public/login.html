<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Tournament Manager</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: var(--bg-secondary);
    }
    .login-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    .login-logo  { text-align:center;font-size:32px;margin-bottom:0.5rem; }
    .login-title { text-align:center;font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:0.25rem; }
    .login-sub   { text-align:center;font-size:12px;color:var(--text-tertiary);margin-bottom:1.5rem; }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 1.5rem;
    }
    .auth-tab {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      color: var(--text-tertiary);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .auth-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .login-field { margin-bottom: 1rem; }
    .login-field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .login-field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text-primary);
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .login-field input:focus { outline:none;border-color:var(--accent); }

    .login-btn {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }
    .login-btn:hover    { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-msg {
      display: none;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: var(--radius-md);
      margin-top: 0.75rem;
    }
    .auth-msg.error {
      display: block;
      background: #fef2f2;
      border: 0.5px solid var(--danger);
      color: var(--danger);
    }
    .auth-msg.success {
      display: block;
      background: var(--bg-success);
      border: 0.5px solid var(--accent);
      color: var(--accent);
    }
    .login-guest {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .login-guest a { color:var(--accent);text-decoration:none;font-weight:500;cursor:pointer; }

    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      cursor: pointer;
      color: var(--text-tertiary);
      background: none;
      border: none;
      padding: 2px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">🏀</div>
      <div class="login-title">Tournament Manager</div>
      <div class="login-sub">JBB Live Scores &amp; Brackets</div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-signin"   onclick="switchTab('signin')">Sign in</div>
        <div class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</div>
      </div>

      <!-- Sign in panel -->
      <div class="auth-panel active" id="panel-signin">
        <div class="login-field">
          <label for="signin-email">Email</label>
          <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="login-field">
          <label for="signin-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password" />
            <button class="password-toggle" onclick="togglePassword('signin-password', this)" type="button">👁</button>
          </div>
        </div>
        <button class="login-btn" id="btn-signin" onclick="doSignIn()">Sign in</button>
        <div class="auth-msg" id="signin-msg"></div>
        <div class="login-guest">
          No account? <a onclick="switchTab('register')">Register as a guest →</a>
        </div>
      </div>

      <!-- Register panel -->
      <div class="auth-panel" id="panel-register">
        <div class="login-field">
          <label for="reg-name">Your name</label>
          <input type="text" id="reg-name" placeholder="e.g. John Kamau" maxlength="60" autocomplete="name" />
        </div>
        <div class="login-field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="login-field">
          <label for="reg-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="reg-password" placeholder="At least 8 characters" autocomplete="new-password" />
            <button class="password-toggle" onclick="togglePassword('reg-password', this)" type="button">👁</button>
          </div>
        </div>
        <div class="login-field">
          <label for="reg-confirm">Confirm password</label>
          <div class="password-wrap">
            <input type="password" id="reg-confirm" placeholder="Repeat password" autocomplete="new-password" />
            <button class="password-toggle" onclick="togglePassword('reg-confirm', this)" type="button">👁</button>
          </div>
        </div>
        <button class="login-btn" id="btn-register" onclick="doRegister()">Create account</button>
        <div class="auth-msg" id="reg-msg"></div>
        <div class="login-guest">
          Already have an account? <a onclick="switchTab('signin')">Sign in →</a>
        </div>
      </div>

      <!-- Guest view link -->
      <div class="login-guest" style="margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border-light);">
        Just browsing? <a href="index.html">Continue as visitor →</a>
      </div>
    </div>
  </div>

  <!-- FIX 1: Correct path matching index.html -->
  <script src="assets/js/pocketbase.umd.js"></script>
  <script>
    // FIX 2: Same dev/prod URL logic as main.js so localhost works
    const API_BASE_URL =
      window.location.hostname === 'localhost' ||
      window.location.hostname === '127.0.0.1'
        ? 'http://127.0.0.1:8090'
        : window.location.origin;

    const pb = new PocketBase(API_BASE_URL);

    // Already logged in — go straight to app
    if (pb.authStore.isValid) {
      window.location.href = 'index.html';
    }

    function switchTab(tab) {
      document.getElementById('tab-signin').classList.toggle('active',    tab === 'signin');
      document.getElementById('tab-register').classList.toggle('active',  tab === 'register');
      document.getElementById('panel-signin').classList.toggle('active',  tab === 'signin');
      document.getElementById('panel-register').classList.toggle('active',tab === 'register');
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
    }

    function showMsg(elId, text, type) {
      const el     = document.getElementById(elId);
      el.textContent = text;
      el.className   = `auth-msg ${type}`;
    }

    async function doSignIn() {
      const email    = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const btn      = document.getElementById('btn-signin');

      if (!email || !password) {
        showMsg('signin-msg', 'Please enter your email and password.', 'error');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Signing in...';

      try {
        await pb.collection('users').authWithPassword(email, password);
        window.location.href = 'index.html';
      } catch (e) {
        console.error('Sign in error:', e);
        showMsg('signin-msg', 'Invalid email or password.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      }
    }

    async function doRegister() {
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;
      const btn      = document.getElementById('btn-register');

      if (!name) {
        showMsg('reg-msg', 'Please enter your name.', 'error'); return;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMsg('reg-msg', 'Please enter a valid email address.', 'error'); return;
      }
      if (password.length < 8) {
        showMsg('reg-msg', 'Password must be at least 8 characters.', 'error'); return;
      }
      if (password !== confirm) {
        showMsg('reg-msg', 'Passwords do not match.', 'error'); return;
      }

      btn.disabled    = true;
      btn.textContent = 'Creating account...';

      try {
        await pb.collection('users').create({
          name,
          email,
          password,
          passwordConfirm : confirm,
          role            : 'guest',
        });

        // Auto sign in after registration
        await pb.collection('users').authWithPassword(email, password);
        window.location.href = 'index.html';

      } catch (e) {
        console.error('Register error:', e);
        // FIX 3: better error extraction covering more PocketBase error shapes
        const data = e?.data?.data ?? {};
        const msg  =
          data.email?.message    ??
          data.password?.message ??
          data.name?.message     ??
          e?.message             ??
          'Registration failed. Please try again.';
        showMsg('reg-msg', msg, 'error');
        btn.disabled    = false;
        btn.textContent = 'Create account';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const panel = document.querySelector('.auth-panel.active');
      if (!panel) return;
      if (panel.id === 'panel-signin')   doSignIn();
      if (panel.id === 'panel-register') doRegister();
    });
  </script>
</body>
</html>
