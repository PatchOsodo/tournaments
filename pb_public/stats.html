<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Stats — Tournament Manager</title>
<!-- Uses the same stylesheet as index.html — no separate styles needed -->
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<nav class="app-nav" id="app-nav">
  <div class="app-nav-links">
    <a href="index.html" class="nav-link active" id="nav-home">🏠 Home</a>
    <a href="stats.html" class="nav-link" id="nav-stats">📊 Stats</a>
  </div>
  <div id="auth-controls"></div>
</nav>

<!-- Bottom nav bar (mobile only) -->
<nav class="bottom-nav">
  <a href="index.html" class="bottom-nav-item">
    <span class="nav-icon">🏠</span>Home
  </a>
  <a href="stats.html" class="bottom-nav-item active">
    <span class="nav-icon">📊</span>Stats
  </a>
  <a href="login.html" class="bottom-nav-item">
    <span class="nav-icon">👤</span>Account
  </a>
</nav>
<div class="page-wrapper">
<div class="app wide">

<div class="page-wrapper">
<div class="app">

  <!-- APP HEADER -->
  <div class="app-header">
    <div>
      <h1>Team Statistics</h1>
      <p>Basketball · Cross-tournament analysis</p>
    </div>
    <div class="app-header-right">
      <span class="conn-dot" id="conn-dot"></span>
      <span class="conn-label" id="conn-label">Connecting...</span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div style="max-width:700px;margin:0 auto;padding:0 1rem 3rem;">

    <!-- Page heading -->
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:1rem 0 0.75rem;flex-wrap:wrap;gap:8px;">
      <div>
        <div style="font-size:18px;font-weight:700;color:var(--text-primary);">
          📊 Team Statistics
        </div>
        <div id="stats-summary"
             style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">
          Loading...
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-row" id="tab-row">
      <button class="tab active" onclick="switchTab(0)">Teams</button>
      <button class="tab"        onclick="switchTab(1)">Head to Head</button>
      <button class="tab"        onclick="switchTab(2)">Rankings</button>
    </div>

    <!-- =====================================================================
         TAB 0: TEAMS
         ===================================================================== -->
    <div class="tab-panel active" id="panel-teams">

      <!-- Search / filter bar -->
      <div style="display:flex;gap:8px;margin:1rem 0;flex-wrap:wrap;">
        <input type="text"
               id="team-search"
               placeholder="Search teams..."
               oninput="filterTeams()"
               style="flex:1;min-width:140px;padding:8px 12px;font-size:13px;
                      border:1px solid var(--border-light);border-radius:var(--radius-md);
                      background:var(--bg-secondary);color:var(--text-primary);" />
        <select id="category-filter"
                onchange="filterTeams()"
                style="flex:1;min-width:140px;padding:8px 12px;font-size:13px;
                       border:1px solid var(--border-light);border-radius:var(--radius-md);
                       background:var(--bg-secondary);color:var(--text-primary);">
          <option value="">All categories</option>
        </select>
      </div>

      <div id="teams-list">
        <div class="empty-state">
          <span class="empty-icon">⏳</span>
          Loading teams...
        </div>
      </div>
    </div>

    <!-- =====================================================================
         TAB 1: HEAD TO HEAD
         ===================================================================== -->
    <div class="tab-panel" id="panel-h2h" style="margin-top:1rem;">

      <!-- Team selectors — grouped by category via optgroup -->
      <div style="display:grid;grid-template-columns:1fr auto 1fr;
                  gap:12px;align-items:center;margin-bottom:1rem;">
        <select id="h2h-team1"
                onchange="loadH2H()"
                style="padding:8px 12px;font-size:13px;
                       border:1px solid var(--border-light);border-radius:var(--radius-md);
                       background:var(--bg-secondary);color:var(--text-primary);">
          <option value="">Select team A</option>
        </select>
        <div style="font-size:14px;font-weight:700;color:var(--text-tertiary);
                    text-align:center;">vs</div>
        <select id="h2h-team2"
                onchange="loadH2H()"
                style="padding:8px 12px;font-size:13px;
                       border:1px solid var(--border-light);border-radius:var(--radius-md);
                       background:var(--bg-secondary);color:var(--text-primary);">
          <option value="">Select team B</option>
        </select>
      </div>

      <div id="h2h-result">
        <div class="empty-state">
          <span class="empty-icon">⚔️</span>
          Select two teams to see their head-to-head record.
        </div>
      </div>
    </div>

    <!-- =====================================================================
         TAB 2: RANKINGS
         ===================================================================== -->
    <div class="tab-panel" id="panel-rankings" style="margin-top:1rem;">

      <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;">
        <select id="rankings-category"
                onchange="renderRankings()"
                style="flex:1;min-width:140px;padding:8px 12px;font-size:13px;
                       border:1px solid var(--border-light);border-radius:var(--radius-md);
                       background:var(--bg-secondary);color:var(--text-primary);">
          <option value="">All categories</option>
        </select>
        <select id="rankings-sort"
                onchange="renderRankings()"
                style="flex:1;min-width:140px;padding:8px 12px;font-size:13px;
                       border:1px solid var(--border-light);border-radius:var(--radius-md);
                       background:var(--bg-secondary);color:var(--text-primary);">
          <option value="win_pct">Win %</option>
          <option value="wins">Total wins</option>
          <option value="point_diff">Point differential</option>
          <option value="points_for">Points scored</option>
          <option value="tournaments">Tournaments played</option>
        </select>
      </div>

      <div id="rankings-table-wrap">
        <div class="empty-state">
          <span class="empty-icon">🏅</span>
          Loading rankings...
        </div>
      </div>
    </div>

  </div><!-- /main content -->
</div><!-- /.app -->
</div><!-- /.page-wrapper -->

<!-- =========================================================================
     TEAM DETAIL MODAL
     ========================================================================= -->
<div id="team-modal-overlay"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);
            z-index:200;overflow-y:auto;padding:1rem;"
     onclick="closeTeamModal(event)">
  <div style="background:var(--bg-primary);border-radius:var(--radius-lg);
              max-width:560px;margin:2rem auto;padding:1.5rem;
              border:0.5px solid var(--border-light);"
       onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;
                align-items:center;margin-bottom:1rem;">
      <h2 id="team-modal-title"
          style="font-size:18px;font-weight:700;margin:0;"></h2>
      <button class="btn sm ghost" onclick="closeTeamModal()">✕</button>
    </div>
    <div id="team-modal-body"></div>
  </div>
</div>

<!-- Scripts — only need PocketBase SDK + config here, no full app modules -->
<script src="assets/js/pocketbase.umd.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/stats.js"></script>

</body>
</html>
